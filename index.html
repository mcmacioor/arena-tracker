<!doctype html>
<html lang="pl">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ArenaTracker</title>
    <meta
      name="description"
      content="ArenaTracker to minimalistyczny tracker zwycięstw League of Legends Arena."
    />
    <link rel="icon" href="assets/favicon.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar" aria-label="Nawigacja ArenaTracker">
        <a class="brand" href="#dashboard" aria-label="ArenaTracker dashboard">
          <span class="brand-mark" aria-hidden="true">AT</span>
          <span>
            <strong>ArenaTracker</strong>
          </span>
        </a>

        <nav class="nav-list" aria-label="Główne widoki">
          <a class="nav-link" href="#matches" data-route="matches">
            <span class="nav-icon" aria-hidden="true">≡</span>
            Mecze
          </a>
          <a class="nav-link" href="#champions" data-route="champions">
            <span class="nav-icon" aria-hidden="true">◇</span>
            Wygrane
          </a>
        </nav>
      </aside>

      <main class="main">
        <header class="topbar" aria-label="Konto użytkownika">
          <div class="topbar-spacer"></div>
          <div class="account-menu" id="accountMenu">
            <button
              class="account-menu-button"
              id="accountMenuButton"
              type="button"
              aria-haspopup="dialog"
              aria-expanded="false"
            >
              <img
                class="account-avatar"
                id="accountAvatar"
                src="https://ddragon.leagueoflegends.com/cdn/16.13.1/img/champion/Malphite.png"
                alt=""
              />
              <span id="accountMenuLabel">Konto</span>
              <span class="account-chevron" aria-hidden="true"></span>
            </button>
          </div>
        </header>

        <section class="hero-panel" aria-labelledby="appTitle">
          <div class="hero-copy">
            <p class="eyebrow">League of Legends Arena</p>
            <h1 id="appTitle">ArenaTracker</h1>
          </div>
        </section>

        <section class="view-stack">
          <div class="view is-visible" id="dashboardView" data-view="dashboard">
            <section class="progress-panel" aria-labelledby="progressTitle">
              <div class="progress-head">
                <div>
                  <p class="eyebrow">Progress</p>
                  <h2 id="progressTitle">Champion wins</h2>
                </div>
                <strong id="progressCounter">0 / 0</strong>
              </div>
              <div class="victory-progress" id="victoryProgress" aria-hidden="true">
                <span></span>
              </div>
            </section>

            <div class="metrics-grid" id="metricsGrid" aria-live="polite"></div>

            <div class="split-layout">
              <section class="panel" aria-labelledby="wonTitle">
                <div class="panel-head">
                  <h2 id="wonTitle">Championi z wygraną</h2>
                </div>
                <div class="champion-strip" id="wonChampionStrip"></div>
              </section>

              <section class="panel" aria-labelledby="recentTitle">
                <div class="panel-head">
                  <h2 id="recentTitle">Ostatnie mecze</h2>
                </div>
                <div class="match-list compact" id="recentMatches"></div>
              </section>
            </div>
          </div>

          <div class="view" id="matchesView" data-view="matches">
            <section class="panel partner-panel" aria-labelledby="partnerStatsTitle">
              <div class="panel-head">
                <h2 id="partnerStatsTitle">Partnerzy z Areny</h2>
              </div>
              <div class="partner-stats" id="partnerStats"></div>
            </section>

            <section class="panel" aria-labelledby="historyTitle">
              <div class="panel-head">
                <h2 id="historyTitle">Mecze</h2>
              </div>
              <div class="match-list" id="matchList"></div>
            </section>
          </div>

          <div class="view" id="championsView" data-view="champions">
            <section class="panel" aria-labelledby="championStatsTitle">
              <div class="panel-head">
                <h2 id="championStatsTitle">Lista championów, którymi wygrałeś</h2>
                <span class="status-pill collection-status" id="collectionStatus">Ukończono 0 z 0</span>
              </div>
              <div class="collection-toolbar" aria-label="Filtr wygranych championów">
                <label>
                  <span>Szukaj championa</span>
                  <input id="championSearchInput" type="search" autocomplete="off" placeholder="np. Vi" />
                </label>
                <div class="segmented-control" aria-label="Status championów">
                  <button class="is-active" type="button" data-collection-mode="won">Wygrani</button>
                  <button type="button" data-collection-mode="missing">Brakujący</button>
                  <button type="button" data-collection-mode="all">Wszyscy</button>
                </div>
                <label>
                  <span>Sortowanie</span>
                  <select id="championSortSelect">
                    <option value="wins">Liczba winów</option>
                    <option value="az">A-Z</option>
                  </select>
                </label>
              </div>
              <div class="champion-collection" id="championCollection"></div>
            </section>
          </div>

          <div class="view" id="resetPasswordView" data-view="reset-password">
            <section class="panel auth-panel narrow-panel" aria-labelledby="resetPasswordTitle">
              <div class="panel-head">
                <h2 id="resetPasswordTitle">Nowe hasło</h2>
              </div>
              <div class="account-status" id="resetTokenStatus"></div>
              <form class="account-form" id="confirmResetForm">
                <label>
                  <span>Nowe hasło</span>
                  <input
                    id="confirmResetPassword"
                    name="password"
                    type="password"
                    autocomplete="new-password"
                    minlength="6"
                    required
                  />
                </label>
                <button class="primary-action" type="submit">Ustaw nowe hasło</button>
              </form>
            </section>
          </div>
        </section>
      </main>
    </div>

    <div class="account-overlay" id="accountOverlay" aria-hidden="true">
      <button class="account-backdrop" id="accountOverlayBackdrop" type="button" aria-label="Zamknij konto"></button>
      <section class="account-dialog" role="dialog" aria-modal="true" aria-labelledby="accountTitle">
        <button class="dialog-close" id="accountOverlayClose" type="button" aria-label="Zamknij">×</button>
        <div class="account-dialog-brand">
          <img
            class="account-dialog-avatar"
            id="accountDialogAvatar"
            src="https://ddragon.leagueoflegends.com/cdn/16.13.1/img/champion/Malphite.png"
            alt=""
          />
          <span>ArenaTracker</span>
        </div>
        <h2 id="accountTitle">Zaloguj</h2>
        <div class="account-status is-hidden" id="accountStatus"></div>

        <div id="authForms">
          <form class="account-form auth-form is-visible" id="loginForm" data-auth-panel="login">
            <label>
              <span>Email</span>
              <input id="loginEmail" name="email" type="email" autocomplete="email" required />
            </label>
            <label>
              <span>Hasło</span>
              <input
                id="loginPassword"
                name="password"
                type="password"
                autocomplete="current-password"
                required
              />
            </label>
            <button class="primary-action" type="submit">Zaloguj</button>
            <div class="auth-switch-row">
              <button type="button" data-auth-switch="reset">Nie pamiętasz hasła?</button>
              <button type="button" data-auth-switch="register">Rejestracja</button>
            </div>
          </form>

          <form class="account-form auth-form" id="registerForm" data-auth-panel="register">
            <label>
              <span>Nazwa</span>
              <input id="registerDisplayName" name="displayName" type="text" autocomplete="nickname" />
            </label>
            <label>
              <span>Email</span>
              <input id="registerEmail" name="email" type="email" autocomplete="email" required />
            </label>
            <label>
              <span>Hasło</span>
              <input
                id="registerPassword"
                name="password"
                type="password"
                autocomplete="new-password"
                minlength="6"
                required
              />
            </label>
            <button class="primary-action" type="submit">Utwórz konto</button>
            <div class="auth-switch-row">
              <button type="button" data-auth-switch="login">Mam już konto</button>
            </div>
          </form>

          <form class="account-form auth-form" id="resetPasswordForm" data-auth-panel="reset">
            <label>
              <span>Email</span>
              <input id="resetEmail" name="email" type="email" autocomplete="email" required />
            </label>
            <button class="primary-action" type="submit">Wyślij link resetujący</button>
            <div class="auth-switch-row">
              <button type="button" data-auth-switch="login">Wróć do logowania</button>
            </div>
          </form>
        </div>

        <div class="profile-panel is-hidden" id="profilePanel">
          <div class="profile-summary">
            <img
              class="profile-avatar"
              id="profileAvatar"
              src="https://ddragon.leagueoflegends.com/cdn/16.13.1/img/champion/Malphite.png"
              alt=""
            />
            <div>
              <strong id="profileName">Konto</strong>
              <span id="profileEmail"></span>
            </div>
          </div>
          <form class="account-form" id="riotProfileForm">
            <div class="form-grid compact-grid">
              <label>
                <span>Nazwa w grze</span>
                <input id="riotGameName" name="gameName" type="text" autocomplete="off" />
              </label>
              <label>
                <span>Tag</span>
                <input id="riotTagLine" name="tagLine" type="text" placeholder="EUNE" autocomplete="off" />
              </label>
              <label>
                <span>Routing</span>
                <select id="riotRouting" name="routing">
                  <option value="europe">Europe</option>
                  <option value="americas">Americas</option>
                  <option value="asia">Asia</option>
                  <option value="sea">SEA</option>
                </select>
              </label>
              <label>
                <span>Region</span>
                <select id="riotRegion" name="region">
                  <option value="eun1">EUNE</option>
                  <option value="euw1">EUW</option>
                  <option value="na1">NA</option>
                  <option value="kr">KR</option>
                  <option value="br1">BR</option>
                  <option value="la1">LAN</option>
                  <option value="la2">LAS</option>
                  <option value="tr1">TR</option>
                </select>
              </label>
            </div>
            <div class="form-actions">
              <button class="primary-action" type="submit">Zapisz konto League</button>
            </div>
          </form>
          <div class="status-box" id="riotSyncStatus"></div>
          <button class="ghost-action" type="button" id="logoutButton">Wyloguj</button>
        </div>
      </section>
    </div>

    <div class="champion-detail-overlay" id="championDetailOverlay" aria-hidden="true">
      <button
        class="account-backdrop"
        id="championDetailBackdrop"
        type="button"
        aria-label="Zamknij szczegóły championa"
      ></button>
      <section class="champion-detail-dialog" role="dialog" aria-modal="true" aria-labelledby="championDetailTitle">
        <button class="dialog-close" id="championDetailClose" type="button" aria-label="Zamknij">×</button>
        <div class="champion-detail-head">
          <span id="championDetailIcon"></span>
          <h2 id="championDetailTitle">Champion</h2>
        </div>
        <div class="detail-stats" id="championDetailStats"></div>
        <div>
          <h3>Historia</h3>
          <div class="detail-history" id="championDetailHistory"></div>
        </div>
      </section>
    </div>

    <div class="toast" id="toast" role="status" aria-live="polite"></div>
    <template id="emptyStateTemplate">
      <div class="empty-state">
        <strong>Brak danych dla tych filtrów.</strong>
        <span>Zaloguj się i zsynchronizuj konto League.</span>
      </div>
    </template>
    <script src="assets/game-data.js"></script>
    <script src="app.js" defer></script>
  </body>
</html>
